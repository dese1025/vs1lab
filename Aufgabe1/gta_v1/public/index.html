<!DOCTYPE html>

<!-- File origin: VS1LAB A1a -->

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTagApp</title>
    <link ref="icon" href="./favicon.ico"/>
    <link rel="stylesheet" href="./stylesheets/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <header class="header row">
        <img src="./images/location.png" class="header__image" alt="an image of a map and location">
        <h1 class="header__title">GeoTagApp</h1>
        <nav class="header__navigation">
            <a href="#">About</a> | <a href="#">Help</a> | <a href="/">Home</a>
        </nav>
    </header>

    <main class="main row">
        <section class="main__tagging tagging col-3">
            <h2>Tagging</h2>

            <!-- ############### VS1Lab 1a Form 1 Start -->
            <form id="tag-form" action="/tagging" method="post">

				<fieldset id="tag-form-field">
					<legend>Add a new GeoTag</legend>

					<label for="tag-form-lat"> Latitude: </label>
					<input id="tag-form-lat" name="latitude" type="number" value="49.01379" readonly>

					<label for="tag-form-lon"> Longitude: </label>
					<input id="tag-form-lon" name="longitude" type="number" value="8.390071" readonly>

					<label for="tag-form-name"> Name: </label>
					<input id="tag-form-name" name="name" type="text" placeholder="e.g. Central Berlin" required maxlength=10 pattern="[A-Za-z]+">

					<label for="tag-form-hash"> Hashtag: </label>
					<input id="tag-form-hash" name="hash" type="text" placeholder="e.g. #bar" maxlength=11 pattern="#[A-Za-z]+">

					<input type="submit" value="Add Tag" />
				</fieldset>

            </form>
            <!-- ############### VS1Lab 1a Form 1 End -->

        </section>

        <section class="main__discovery discovery col-9">
            <h2 class="discovery__title">Discovery</h2>

            <!-- ############### VS1Lab 1a Form 2 Start -->
            <form class="discovery__search" id="discoveryFilterForm" action="/discovery" method="post">

				<fieldset id="discovery__field">
					<legend>Search</legend>

                    <input id="discov-form-lat"  name="latitude"  type="number" value="49.01379" readonly hidden>
                    <input id="discov-form-lon"  name="longitude" type="number" value="8.390071" readonly hidden>

					<label for="search-form-searchterm"> Search term or keywords: </label>
					<input id="search-form-searchterm" name="searchterm" type="text" maxlength=11 placeholder="e.g. Berlin"  pattern="#?[A-Za-z]{1,10}">

					<input type="submit" value="Search" />
				</fieldset>

            </form>
            <!-- ############### VS1Lab 1a Form 2 End -->

            <div class="discovery__wrapper row">
                <div class="discovery__taglist col-5">
                    <ul class="discovery__results" id="discoveryResults">
                        <li>Castle (49.01379, 8.404435) #sight</li>
                        <li>IWI (49.01379, 8.390071) #edu</li>
                    </ul>
                </div>

                <div id="map" class="discovery__map col-7">
                    <img src="./images/mapview.jpg" alt="a map with locations" id="mapView" />
                    <span>Result map</span>
                </div>
            </div>
        </section>

    </main>

    <footer class="footer row">
        <span>(c) 2021/22 HKA_IWI_VSYS</span>
    </footer>
</body>

</html>
